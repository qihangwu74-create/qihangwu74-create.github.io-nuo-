<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>傩面 NUO｜元宇宙数字驱邪仪式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap');
       
        :root { --gold: #f2cc60; --cyan: #00f2ff; --purple: #bf77ff; }
       
        body { 
            font-family: 'Noto Serif SC', system-ui; 
            background: #0a0a0f; 
            color: #fff; 
            overflow-x: hidden; 
        }
       
        .glass { 
            background: rgba(15,15,25,0.95); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
       
        .neon-gold { text-shadow: 0 0 30px var(--gold); }
       
        .boss-container { animation: boss-float 3s ease-in-out infinite; }
        @keyframes boss-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
       
        .tab-active { border-bottom:4px solid var(--gold); color:var(--gold); }
        .bottom-tab-active { color: var(--gold); transform: scale(1.15); }
        
        /* 手机专属优化 */
        @media (max-width: 768px) {
            .boss-visual { width: 280px !important; height: 280px !important; }
            .action-btn { min-height: 88px; }
        }
        
        .bottom-nav {
            box-shadow: 0 -4px 30px rgba(0,0,0,0.6);
        }
        
        /* 修复顶部遮挡：动态padding */
        #main-content {
            transition: padding-top 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen pb-24 md:pb-0">

<!-- 顶部导航栏 -->
<nav id="smart-nav" class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10 transition-transform duration-300 ease-in-out">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-3">
            <img src="傩面前-07.png" class="w-14 h-14 object-contain drop-shadow-2xl">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter neon-gold">傩面 NUO</h1>
                <p class="text-[10px] tracking-widest text-white/50">沉浸式数字驱邪仪式 · 2024</p>
            </div>
        </div>

        <!-- 桌面标签 -->
        <div class="hidden md:flex gap-8 text-sm font-medium">
            <button onclick="switchTab(0)" class="tab-btn tab-active px-5 py-3 hover:text-white transition">仪式场</button>
            <button onclick="switchTab(1)" class="tab-btn px-5 py-3 hover:text-white transition">传统文化</button>
            <button onclick="switchTab(2)" class="tab-btn px-5 py-3 hover:text-white transition">疫鬼调研</button>
            <button onclick="switchTab(3)" class="tab-btn px-5 py-3 hover:text-white transition">设计映射</button>
            <button onclick="switchTab(4)" class="tab-btn px-5 py-3 hover:text-white transition">玩法机制</button>
            <button onclick="switchTab(5)" class="tab-btn px-5 py-3 hover:text-white transition">视觉设计</button>
        </div>

        <!-- 音量 + 作者图标（手机和桌面都可见） -->
        <div class="flex items-center gap-3">
            <div onclick="toggleSound()" class="cursor-pointer w-10 h-10 glass rounded-2xl flex items-center justify-center hover:scale-110 transition">
                <i id="sound-icon" class="fas fa-volume-up text-2xl"></i>
            </div>
            
            <!-- 手机作者图标 -->
            <div onclick="showAuthorInfo()" class="cursor-pointer w-10 h-10 glass rounded-2xl flex items-center justify-center hover:scale-110 transition md:hidden">
                <i class="fas fa-user text-xl text-gold"></i>
            </div>
            
            <!-- 桌面作者卡片 -->
            <div onclick="showAuthorInfo()" class="author-card glass px-5 py-2 rounded-3xl text-xs cursor-pointer hidden md:flex flex-col items-end">
                <span class="text-gold font-medium">吴启杭</span>
            </div>
        </div>
    </div>
</nav>

<!-- 手机底部导航栏 -->
<div id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 md:hidden glass border-t border-white/10 bottom-nav">
    <div class="flex justify-around items-center py-2 max-w-md mx-auto">
        <button onclick="switchTab(0)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="0">
            <i class="fas fa-mask text-2xl"></i><span>仪式场</span>
        </button>
        <button onclick="switchTab(1)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="1">
            <i class="fas fa-book text-2xl"></i><span>传统文化</span>
        </button>
        <button onclick="switchTab(2)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="2">
            <i class="fas fa-skull text-2xl"></i><span>疫鬼调研</span>
        </button>
        <button onclick="switchTab(3)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="3">
            <i class="fas fa-project-diagram text-2xl"></i><span>设计映射</span>
        </button>
        <button onclick="switchTab(4)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="4">
            <i class="fas fa-gamepad text-2xl"></i><span>玩法机制</span>
        </button>
        <button onclick="switchTab(5)" class="bottom-tab flex flex-col items-center gap-1 text-[10px] transition-all active:scale-95" data-tab="5">
            <i class="fas fa-palette text-2xl"></i><span>视觉设计</span>
        </button>
    </div>
</div>

<!-- 主内容（增加id用于动态padding） -->
<div id="main-content" class="max-w-7xl mx-auto px-4">

    <!-- TAB 0：仪式场 -->
    <div id="tab-0" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="md:col-span-3">
                <div class="glass rounded-3xl p-5 sticky md:top-28">
                    <h2 class="text-xl font-semibold mb-5 flex items-center gap-3">👁️ 现代疫鬼图鉴</h2>
                    <div id="ghost-list" class="space-y-3"></div>
                </div>
            </div>

            <div class="md:col-span-6">
                <div class="glass rounded-3xl p-5 sm:p-8 min-h-[520px] flex flex-col">
                    <div class="text-center mb-6">
                        <div id="stage" class="inline px-6 py-1.5 bg-white/10 rounded-full text-xs tracking-widest">STAGE 01 — 降神诊断</div>
                        <h1 id="boss-name" class="text-4xl sm:text-5xl font-black tracking-tighter neon-gold mt-4">金嗜·吞秒</h1>
                        <p id="boss-desc" class="text-white/60 mt-2 text-sm">平均屏幕时间 > 6.5h</p>
                    </div>

                    <div class="flex-1 relative flex items-center justify-center cursor-pointer" id="boss-area" onclick="quickTapBoss()">
                        <div id="boss-visual" class="boss-container boss-visual w-[280px] h-[280px] sm:w-[320px] sm:h-[320px] relative"></div>
                        <div id="slash-layer" class="absolute inset-0 pointer-events-none"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button onclick="performAction(0)" class="action-btn glass rounded-3xl py-7 text-sm flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-bolt text-5xl text-yellow-400"></i><span>震慑 / 抖动</span>
                        </button>
                        <button onclick="performAction(1)" class="action-btn glass rounded-3xl py-7 text-sm flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-hands text-5xl text-cyan-400"></i><span>祈福 / 舒展</span>
                        </button>
                        <button onclick="performAction(2)" class="action-btn glass rounded-3xl py-7 text-sm flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-shoe-prints text-5xl text-purple-400"></i><span>节律 / 踏步</span>
                        </button>
                        <button onclick="performAction(3)" class="action-btn glass rounded-3xl py-7 text-sm flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-sword text-5xl text-red-400"></i><span>开路 / 劈砍</span>
                        </button>
                    </div>

                    <button onclick="startRitual()" id="ritual-btn"
                        class="mt-8 w-full py-7 bg-gradient-to-r from-yellow-400 via-orange-400 to-amber-500 text-black font-black text-3xl rounded-3xl active:scale-95 transition">
                        执行具身驱邪仪式
                    </button>
                </div>
            </div>

            <div class="md:col-span-3">
                <div class="glass rounded-3xl p-5 flex flex-col h-full">
                    <h2 class="text-xl font-semibold mb-5">已净化数字资产</h2>
                    <div id="asset-gallery" class="flex-1 grid grid-cols-2 gap-4"></div>
                    <div class="mt-auto pt-8">
                        <div class="text-xs text-white/50">仪式完成度</div>
                        <div class="h-3 bg-white/10 rounded-full mt-3 overflow-hidden">
                            <div id="total-progress" class="h-full bg-gradient-to-r from-yellow-400 to-purple-500 w-0 transition-all duration-700"></div>
                        </div>
                        <div id="progress-text" class="text-right text-xs mt-1 font-mono">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 其余TAB -->
    <div id="tab-1" class="tab-content hidden"><div class="glass rounded-3xl p-4 max-w-6xl mx-auto"><img src="未标题-2-02.png" class="w-full rounded-3xl"><p class="text-center mt-4 text-xs opacity-75">一 · 传统文化</p></div></div>
    <div id="tab-2" class="tab-content hidden"><div class="glass rounded-3xl p-4 max-w-6xl mx-auto"><img src="未标题-2-03.png" class="w-full rounded-3xl"><p class="text-center mt-4 text-xs opacity-75">二 · 现代疫鬼调研</p></div></div>
    <div id="tab-3" class="tab-content hidden"><div class="glass rounded-3xl p-4 max-w-6xl mx-auto"><img src="未标题-1-04.jpg" class="w-full rounded-3xl"><p class="text-center mt-4 text-xs opacity-75">三 · 设计映射逻辑</p></div></div>
    <div id="tab-4" class="tab-content hidden"><div class="glass rounded-3xl p-4 max-w-6xl mx-auto"><img src="未标题-1-05.jpg" class="w-full rounded-3xl"><p class="text-center mt-4 text-xs opacity-75">四 · 核心玩法机制</p></div></div>
    <div id="tab-5" class="tab-content hidden"><div class="glass rounded-3xl p-4 max-w-6xl mx-auto"><img src="未标题-1-06.jpg" class="w-full rounded-3xl"><p class="text-center mt-4 text-xs opacity-75">五 · 项目视觉设计</p></div></div>
</div>

<!-- 胜利弹窗 -->
<div id="win-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[60] px-4">
    <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
        <div class="text-8xl mb-6">🪔✨</div>
        <h2 class="text-5xl font-black">仪式圆满！</h2>
        <p class="my-6 text-lg">四大精神疫鬼已被傩舞彻底驱散</p>
        <button onclick="restartAll()" class="w-full py-6 bg-white text-black font-black text-3xl rounded-3xl active:scale-95">再次进入元宇宙</button>
    </div>
</div>

<!-- 作者信息弹窗 -->
<div id="author-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60] px-4">
    <div class="glass rounded-3xl p-8 max-w-xs w-full text-center">
        <div class="text-3xl text-gold mb-6">吴启杭</div>
        <a href="mailto:3029833102@qq.com" class="block py-4 text-cyan-300 flex items-center justify-center gap-3 text-lg"><i class="fas fa-envelope"></i> 3029833102@qq.com</a>
        <a href="tel:15779133734" class="block py-4 text-cyan-300 flex items-center justify-center gap-3 text-lg"><i class="fas fa-phone"></i> 15779133734</a>
        <button onclick="hideAuthorModal()" class="mt-8 text-white/60">关闭</button>
    </div>
</div>

<script>
    tailwind.config = { content: ["*"] }
   
    const ghosts = [
        {id:0, name:"金嗜·吞秒", color:"#f2cc60", img:"9.png", desc:"日均屏幕时间6h40m|日均解锁144次", energy:35, action:0, asset:"金箔粒子"},
        {id:1, name:"乱绒·唏蓝", color:"#00f2ff", img:"22.png", desc:"全球超3.01亿患者|33%成人经历严重压力", energy:30, action:1, asset:"全息面具"},
        {id:2, name:"纠星·萦紫", color:"#bf77ff", img:"5.png", desc:"日产想法1.2万-6万（80%消极）|效率下降20%-40%", energy:20, action:2, asset:"对称纹样"},
        {id:3, name:"匿鳞·银障", color:"#888888", img:"12.png", desc:"SAD影响1500万成人|超61%年轻人感到孤独", energy:15, action:3, asset:"治愈音色"}
    ]
   
    let currentGhost = 0, health = 100, purified = [], soundEnabled = true, currentTab = 0
    let lastX = 0, lastY = 0, lastZ = 0, shakeCooldown = 0

    // ============== 动态修复顶部遮挡 ==============
    function adjustNavOffset() {
        const nav = document.getElementById('smart-nav')
        const main = document.getElementById('main-content')
        if (!nav || !main) return
        const navHeight = nav.offsetHeight
        main.style.paddingTop = (navHeight + 16) + 'px'  // +16px 留点呼吸空间
    }
    window.addEventListener('resize', adjustNavOffset)
    window.addEventListener('orientationchange', () => {
        setTimeout(adjustNavOffset, 300)  // 横竖屏切换后延迟重新计算
    })

    function createGhostCards() {
        const container = document.getElementById('ghost-list')
        container.innerHTML = ''
        ghosts.forEach((g,i) => {
            const purifiedFlag = purified.includes(i)
            const div = document.createElement('div')
            div.className = `glass rounded-3xl p-5 flex gap-4 items-center cursor-pointer hover:ring-2 hover:ring-yellow-400 transition ${currentGhost===i?'ring-2 ring-yellow-400':''} ${purifiedFlag?'opacity-40':''}`
            div.innerHTML = `
                <img src="${g.img}" class="w-16 h-16 object-contain rounded-2xl flex-shrink-0">
                <div class="flex-1">
                    <div class="font-semibold">${g.name}</div>
                    <div class="text-xs text-white/60 line-clamp-2">${g.desc}</div>
                </div>
            `
            div.onclick = () => { if(!purifiedFlag){ currentGhost=i; loadCurrentGhost() }}
            container.appendChild(div)
        })
    }
   
    function loadCurrentGhost() {
        const g = ghosts[currentGhost]
        document.getElementById('boss-name').textContent = g.name
        document.getElementById('boss-desc').textContent = g.desc
        document.getElementById('boss-visual').innerHTML = `<img src="${g.img}" class="w-full h-full object-contain drop-shadow-[0_0_80px_${g.color}]">`
        health = 100
    }
   
    function performAction(act) {
        const g = ghosts[currentGhost]
        const correct = g.action === act
        
        if (navigator.vibrate) navigator.vibrate(correct ? [80, 40, 120] : [50])
        
        if(soundEnabled){
            const ctx = new AudioContext()
            const osc = ctx.createOscillator()
            osc.frequency.value = correct ? 920 : 140
            osc.connect(ctx.destination)
            osc.start()
            setTimeout(()=>osc.stop(),90)
        }
        
        if(correct){
            health = Math.max(health-28, 0)
            if(health<=0) defeatGhost()
        } else {
            health = Math.max(health-10, 0)
        }
    }
   
    function quickTapBoss() {
        if (window.innerWidth <= 768) performAction(0)
    }
   
    // ============== 新增：摇一摇交互（仅手机 + 仅仪式场） ==============
    function handleShake(event) {
        if (currentTab !== 0) return
        const now = Date.now()
        if (now - shakeCooldown < 800) return
        
        const accel = event.accelerationIncludingGravity
        if (!accel) return
        
        const delta = Math.abs(accel.x - lastX) + Math.abs(accel.y - lastY) + Math.abs(accel.z - lastZ)
        
        if (delta > 22) {  // 摇晃力度阈值（可根据手机灵敏度微调）
            shakeCooldown = now
            if (navigator.vibrate) navigator.vibrate([100, 50, 100])
            performAction(2)  // 摇一摇触发“节律 / 踏步”（最有仪式感）
        }
        
        lastX = accel.x || 0
        lastY = accel.y || 0
        lastZ = accel.z || 0
    }
   
    function defeatGhost() {
        purified.push(currentGhost)
        const gallery = document.getElementById('asset-gallery')
        const g = ghosts[currentGhost]
        const card = document.createElement('div')
        card.className = 'glass rounded-2xl p-3 text-center'
        card.innerHTML = `<img src="${g.img}" class="mx-auto w-14"><div class="font-medium text-xs mt-3">${g.asset}</div>`
        gallery.appendChild(card)
       
        const prog = Math.round(purified.length/4*100)
        document.getElementById('total-progress').style.width = prog+'%'
        document.getElementById('progress-text').textContent = prog+'%'
       
        if(purified.length===4){
            setTimeout(()=>document.getElementById('win-modal').classList.remove('hidden'),800)
            if (navigator.vibrate) navigator.vibrate([200,100,200,100,300])
        } else {
            for(let i=0;i<4;i++) if(!purified.includes(i)){currentGhost=i; loadCurrentGhost();break}
        }
        createGhostCards()
    }
   
    function startRitual(){
        const btn = document.getElementById('ritual-btn')
        btn.innerHTML = '仪式进行中...'
        btn.disabled = true
        if (navigator.vibrate) navigator.vibrate(60)
        setTimeout(()=>{btn.innerHTML='执行具身驱邪仪式';btn.disabled=false; performAction(ghosts[currentGhost].action)},520)
    }
   
    function switchTab(n){
        currentTab = n
        document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'))
        document.getElementById('tab-'+n).classList.remove('hidden')
        
        document.querySelectorAll('.tab-btn').forEach((b,i)=>i===n?b.classList.add('tab-active'):b.classList.remove('tab-active'))
        document.querySelectorAll('.bottom-tab').forEach(btn => {
            btn.classList.toggle('bottom-tab-active', parseInt(btn.dataset.tab) === n)
        })
    }
   
    function toggleSound(){
        soundEnabled = !soundEnabled
        const icon = document.getElementById('sound-icon')
        icon.classList.toggle('fa-volume-up')
        icon.classList.toggle('fa-volume-xmark')
    }
   
    function restartAll(){
        purified = []
        document.getElementById('asset-gallery').innerHTML = ''
        document.getElementById('total-progress').style.width = '0%'
        document.getElementById('progress-text').textContent = '0%'
        document.getElementById('win-modal').classList.add('hidden')
        currentGhost = 0
        loadCurrentGhost()
        createGhostCards()
        switchTab(0)
    }
   
    function showAuthorInfo(){ document.getElementById('author-modal').classList.remove('hidden') }
    function hideAuthorModal(){ document.getElementById('author-modal').classList.add('hidden') }
   
    // 智能导航隐藏
    let lastScrollY = 0
    const smartNav = document.getElementById('smart-nav')
    window.addEventListener('scroll', () => {
        const current = window.scrollY
        if (current > lastScrollY && current > 100) {
            smartNav.style.transform = 'translateY(-100%)'
        } else {
            smartNav.style.transform = 'translateY(0)'
        }
        lastScrollY = current
    })
   
    window.onload = () => {
        createGhostCards()
        loadCurrentGhost()
        switchTab(0)
        adjustNavOffset()           // 首次计算padding
        window.addEventListener('devicemotion', handleShake)  // 开启摇一摇
    }
</script>
</body>
</html>
