<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>傩面 NUO｜元宇宙数字驱邪仪式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap');
       
        :root { --gold: #f2cc60; --cyan: #00f2ff; --purple: #bf77ff; }
       
        body { 
            font-family: 'Noto Serif SC', system-ui; 
            background: #0a0a0f; 
            color: #fff; 
            overflow-x: hidden; 
        }
       
        .glass { 
            background: rgba(15,15,25,0.92); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
       
        .neon-gold { text-shadow: 0 0 30px var(--gold); }
       
        .author-card { transition: all 0.3s cubic-bezier(0.68,-0.55,0.27,1.55); }
        .author-card:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--gold); }
       
        .boss-container { animation: boss-float 3s ease-in-out infinite; }
        @keyframes boss-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
       
        .particle { position:absolute; width:8px; height:8px; border-radius:50%; animation:particle-float 1.4s ease-out forwards; }
        @keyframes particle-float { 0%{transform:scale(1)translate(0,0);opacity:1} 100%{transform:scale(0)translate(var(--x),var(--y));opacity:0} }
       
        .slash { position:absolute; width:6px; height:220px; background:linear-gradient(transparent,#fff,transparent); box-shadow:0 0 50px #fff; animation:slash-anim 0.45s ease-out forwards; }
        @keyframes slash-anim { 0%{transform:rotate(-65deg)scaleY(0);opacity:0} 100%{transform:rotate(65deg)scaleY(2);opacity:0} }
       
        .tab-active { border-bottom:4px solid var(--gold); color:var(--gold); }
       
        /* 手机优化样式 */
        .nav-tabs {
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .action-btn {
            transition: all 0.2s ease;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        
        /* 手机端鬼怪卡片更紧凑 */
        @media (max-width: 640px) {
            .ghost-card {
                flex-direction: row;
                padding: 12px;
            }
        }
    </style>
</head>
<body class="min-h-screen pb-20">
<!-- 智能导航栏（手机端横向滚动 + 更紧凑） -->
<nav id="smart-nav" class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10 transition-transform duration-300 ease-in-out">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <!-- Logo + 标题（手机端缩小） -->
        <div class="flex items-center gap-3 flex-shrink-0">
            <img src="傩面前-07.png" class="w-14 h-14 sm:w-16 sm:h-16 object-contain drop-shadow-2xl">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tighter neon-gold">傩面 NUO</h1>
                <p class="text-[10px] sm:text-xs tracking-widest text-white/50 -mt-1">沉浸式数字驱邪仪式 · 2024</p>
            </div>
        </div>
       
        <!-- 导航按钮（手机端横向滚动） -->
        <div class="flex gap-2 sm:gap-4 md:gap-9 text-xs sm:text-sm font-medium overflow-x-auto nav-tabs pb-1 flex-nowrap max-w-[calc(100%-180px)]">
            <button onclick="switchTab(0)" class="tab-btn tab-active px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">仪式场</button>
            <button onclick="switchTab(1)" class="tab-btn px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">传统文化</button>
            <button onclick="switchTab(2)" class="tab-btn px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">疫鬼调研</button>
            <button onclick="switchTab(3)" class="tab-btn px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">设计映射</button>
            <button onclick="switchTab(4)" class="tab-btn px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">玩法机制</button>
            <button onclick="switchTab(5)" class="tab-btn px-4 py-2.5 whitespace-nowrap hover:text-white transition flex-shrink-0">视觉设计</button>
        </div>
       
        <!-- 作者 + 音量（手机端更紧凑） -->
        <div class="flex items-center gap-3 flex-shrink-0">
            <div onclick="toggleSound()" class="cursor-pointer w-9 h-9 glass rounded-2xl flex items-center justify-center hover:scale-110 transition">
                <i id="sound-icon" class="fas fa-volume-up text-xl"></i>
            </div>
            
            <!-- 作者卡片手机端隐藏，点击可弹出（简单处理） -->
            <div onclick="showAuthorInfo()" class="author-card glass px-4 py-2 rounded-3xl text-xs flex flex-col items-end cursor-pointer md:flex hidden">
                <div class="flex items-center gap-2 text-gold font-medium">
                    <i class="fas fa-user"></i>
                    <span>吴启杭</span>
                </div>
            </div>
        </div>
    </div>
</nav>

<script>
function adjustNavOffset() {
    const nav = document.querySelector('nav');
    if (!nav) return;
    const height = nav.getBoundingClientRect().height;
    document.body.style.paddingTop = height + 'px';
}
window.addEventListener('DOMContentLoaded', adjustNavOffset);
window.addEventListener('resize', adjustNavOffset);
</script>

<!-- 主内容区域 -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 pt-4">
    
    <!-- TAB 0：仪式场（手机端垂直堆叠 + 更大触控区域） -->
    <div id="tab-0" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 lg:gap-8">
            
            <!-- 左侧疫鬼图鉴（手机端置顶，卡片更紧凑） -->
            <div class="md:col-span-3 order-2 md:order-1">
                <div class="glass rounded-3xl p-5 sticky md:top-28">
                    <h2 class="text-xl font-semibold mb-5 flex items-center gap-3">👁️ 现代疫鬼图鉴</h2>
                    <div id="ghost-list" class="space-y-3"></div>
                </div>
            </div>
           
            <!-- 中央仪式舞台（手机端更宽松，Boss更大触控） -->
            <div class="md:col-span-6 order-1 md:order-2">
                <div class="glass rounded-3xl p-5 sm:p-8 min-h-[520px] md:h-[680px] flex flex-col">
                    <div class="text-center mb-6">
                        <div id="stage" class="inline px-6 py-1.5 bg-white/10 rounded-full text-[10px] sm:text-xs tracking-widest">STAGE 01 — 降神诊断</div>
                        <h1 id="boss-name" class="text-4xl sm:text-5xl md:text-6xl font-black tracking-tighter neon-gold mt-4">金嗜·吞初</h1>
                        <p id="boss-desc" class="text-white/60 mt-2 text-sm sm:text-base">平均屏幕时间 > 6.5h</p>
                    </div>
                   
                    <div class="flex-1 relative flex items-center justify-center" id="boss-area">
                        <div id="boss-visual" class="boss-container w-[260px] h-[260px] sm:w-[300px] sm:h-[300px] md:w-[380px] md:h-[380px] relative mx-auto"></div>
                        <div id="slash-layer" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                   
                    <!-- 操作按钮（手机端2列排列，触控更友好） -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                        <button onclick="performAction(0)" class="action-btn glass rounded-3xl py-6 md:py-7 hover:scale-110 transition flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-bolt text-4xl text-yellow-400"></i>
                            <span class="text-xs sm:text-sm">震慑 / 抖动</span>
                        </button>
                        <button onclick="performAction(1)" class="action-btn glass rounded-3xl py-6 md:py-7 hover:scale-110 transition flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-hands text-4xl text-cyan-400"></i>
                            <span class="text-xs sm:text-sm">祈福 / 舒展</span>
                        </button>
                        <button onclick="performAction(2)" class="action-btn glass rounded-3xl py-6 md:py-7 hover:scale-110 transition flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-shoe-prints text-4xl text-purple-400"></i>
                            <span class="text-xs sm:text-sm">节律 / 踏步</span>
                        </button>
                        <button onclick="performAction(3)" class="action-btn glass rounded-3xl py-6 md:py-7 hover:scale-110 transition flex flex-col items-center gap-3 active:scale-95">
                            <i class="fas fa-sword text-4xl text-red-400"></i>
                            <span class="text-xs sm:text-sm">开路 / 劈砍</span>
                        </button>
                    </div>
                   
                    <button onclick="startRitual()" id="ritual-btn"
                        class="mt-8 w-full py-6 md:py-7 bg-gradient-to-r from-yellow-400 via-orange-400 to-amber-500 text-black font-black text-2xl md:text-3xl rounded-3xl shadow-2xl hover:brightness-125 active:scale-95 transition">
                        执行具身驱邪仪式
                    </button>
                </div>
            </div>
           
            <!-- 右侧已净化资产（手机端置底） -->
            <div class="md:col-span-3 order-3">
                <div class="glass rounded-3xl p-5 h-full flex flex-col">
                    <h2 class="text-xl font-semibold mb-5">已净化数字资产</h2>
                    <div id="asset-gallery" class="flex-1 grid grid-cols-2 gap-4"></div>
                    <div class="mt-auto pt-8">
                        <div class="text-xs text-white/50">仪式完成度</div>
                        <div class="h-3 bg-white/10 rounded-full mt-3 overflow-hidden">
                            <div id="total-progress" class="h-full bg-gradient-to-r from-yellow-400 to-purple-500 w-0 transition-all duration-700"></div>
                        </div>
                        <div id="progress-text" class="text-right text-xs mt-1 font-mono">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 其他 TAB（手机端已自动适配，图片全宽） -->
    <div id="tab-1" class="tab-content hidden">
        <div class="glass rounded-3xl p-4 sm:p-8 max-w-6xl mx-auto">
            <img src="未标题-2-02.png" class="w-full rounded-3xl shadow-2xl">
            <p class="text-center mt-6 text-xs sm:text-sm opacity-75">一 · 传统文化（原PDF第2页完整可视化）</p>
        </div>
    </div>
    <div id="tab-2" class="tab-content hidden">
        <div class="glass rounded-3xl p-4 sm:p-8 max-w-6xl mx-auto">
            <img src="未标题-2-03.png" class="w-full rounded-3xl shadow-2xl">
            <p class="text-center mt-6 text-xs sm:text-sm opacity-75">二 · 现代疫鬼调研（原PDF第3页完整可视化）</p>
        </div>
    </div>
    <div id="tab-3" class="tab-content hidden">
        <div class="glass rounded-3xl p-4 sm:p-8 max-w-6xl mx-auto">
            <img src="未标题-1-04.jpg" class="w-full rounded-3xl shadow-2xl">
            <p class="text-center mt-6 text-xs sm:text-sm opacity-75">三 · 设计映射逻辑（原PDF第4页完整可视化）</p>
        </div>
    </div>
    <div id="tab-4" class="tab-content hidden">
        <div class="glass rounded-3xl p-4 sm:p-8 max-w-6xl mx-auto">
            <img src="未标题-1-05.jpg" class="w-full rounded-3xl shadow-2xl">
            <p class="text-center mt-6 text-xs sm:text-sm opacity-75">四 · 核心玩法机制（原PDF第5页完整可视化）</p>
        </div>
    </div>
    <div id="tab-5" class="tab-content hidden">
        <div class="glass rounded-3xl p-4 sm:p-8 max-w-6xl mx-auto">
            <img src="未标题-1-06.jpg" class="w-full rounded-3xl shadow-2xl">
            <p class="text-center mt-6 text-xs sm:text-sm opacity-75">五 · 项目视觉设计（原PDF第6页完整可视化）</p>
        </div>
    </div>
</div>

<!-- 胜利弹窗（手机端更大更友好） -->
<div id="win-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 px-4">
    <div class="glass rounded-3xl p-10 sm:p-16 text-center max-w-md w-full">
        <div class="text-7xl mb-8">🪔✨</div>
        <h2 class="text-4xl sm:text-5xl font-black">仪式圆满！</h2>
        <p class="my-8 text-lg sm:text-xl">四大精神疫鬼已被傩舞彻底驱散</p>
        <button onclick="restartAll()" class="w-full sm:w-auto px-14 py-6 bg-white text-black rounded-3xl font-black text-2xl active:scale-95 transition">
            再次进入元宇宙
        </button>
    </div>
</div>

<!-- 作者信息弹窗（手机端专用） -->
<div id="author-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 px-4">
    <div class="glass rounded-3xl p-8 max-w-xs w-full text-center">
        <div class="text-gold text-2xl mb-4">吴启杭</div>
        <a href="mailto:3029833102@qq.com" class="block py-3 text-cyan-400 hover:underline flex items-center justify-center gap-2">
            <i class="fas fa-envelope"></i> 3029833102@qq.com
        </a>
        <a href="tel:15779133734" class="block py-3 text-cyan-400 hover:underline flex items-center justify-center gap-2">
            <i class="fas fa-phone"></i> 15779133734
        </a>
        <button onclick="hideAuthorModal()" class="mt-6 text-white/60 text-sm">关闭</button>
    </div>
</div>

<script>
    tailwind.config = { content: ["*"] }
   
    const ghosts = [
        {id:0, name:"金嗜·吞秒", color:"#f2cc60", img:"9.png", desc:"日均屏幕时间6h40m|日均解锁144次", energy:35, action:0, asset:"金箔粒子"},
        {id:1, name:"乱绒·唏蓝", color:"#00f2ff", img:"22.png", desc:"全球超3.01亿患者|33%成人经历严重压力", energy:30, action:1, asset:"全息面具"},
        {id:2, name:"纠星·萦紫", color:"#bf77ff", img:"5.png", desc:"日产想法1.2万-6万（80%消极）|效率下降20%-40%", energy:20, action:2, asset:"对称纹样"},
        {id:3, name:"匿鳞·银障", color:"#888888", img:"12.png", desc:"SAD影响1500万成人|超61%年轻人感到孤独", energy:15, action:3, asset:"治愈音色"}
    ]
   
    let currentGhost = 0, health = 100, purified = [], soundEnabled = true
   
    function createGhostCards() {
        const container = document.getElementById('ghost-list')
        container.innerHTML = ''
        ghosts.forEach((g,i) => {
            const purifiedFlag = purified.includes(i)
            const div = document.createElement('div')
            div.className = `ghost-card glass rounded-3xl p-5 flex gap-4 items-center cursor-pointer hover:ring-2 hover:ring-yellow-400 transition ${currentGhost===i?'ring-2 ring-yellow-400':''} ${purifiedFlag?'opacity-40':''}`
            div.innerHTML = `
                <img src="${g.img}" class="w-16 h-16 object-contain rounded-2xl flex-shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm truncate">${g.name}</div>
                    <div class="text-[10px] text-white/60 line-clamp-2">${g.desc}</div>
                </div>
            `
            div.onclick = () => { if(!purifiedFlag){ currentGhost=i; loadCurrentGhost() }}
            container.appendChild(div)
        })
    }
   
    function loadCurrentGhost() {
        const g = ghosts[currentGhost]
        document.getElementById('boss-name').textContent = g.name
        document.getElementById('boss-desc').textContent = g.desc
        document.getElementById('boss-visual').innerHTML = `<img src="${g.img}" class="w-full h-full object-contain drop-shadow-[0_0_60px_${g.color}]">`
        health = 100
    }
   
    function performAction(act) {
        const g = ghosts[currentGhost]
        const correct = g.action === act
        if(soundEnabled){
            const ctx = new AudioContext()
            const osc = ctx.createOscillator()
            osc.frequency.value = correct ? 920 : 140
            osc.connect(ctx.destination)
            osc.start()
            setTimeout(()=>osc.stop(),90)
        }
        if(correct){
            health = Math.max(health-26, 0)
            if(health<=0) defeatGhost()
        } else {
            health = Math.max(health-9, 0)
        }
    }
   
    function defeatGhost() {
        purified.push(currentGhost)
        const gallery = document.getElementById('asset-gallery')
        const g = ghosts[currentGhost]
        const card = document.createElement('div')
        card.className = 'glass rounded-2xl p-3 text-center'
        card.innerHTML = `<img src="${g.img}" class="mx-auto w-14"><div class="font-medium text-xs mt-3">${g.asset}</div>`
        gallery.appendChild(card)
       
        const prog = Math.round(purified.length/4*100)
        document.getElementById('total-progress').style.width = prog+'%'
        document.getElementById('progress-text').textContent = prog+'%'
       
        if(purified.length===4){
            setTimeout(()=>document.getElementById('win-modal').classList.remove('hidden'),900)
        } else {
            for(let i=0;i<4;i++) if(!purified.includes(i)){currentGhost=i; loadCurrentGhost();break}
        }
        createGhostCards()
    }
   
    function startRitual(){
        const btn = document.getElementById('ritual-btn')
        btn.innerHTML = '仪式进行中...'
        btn.disabled = true
        setTimeout(()=>{btn.innerHTML='执行具身驱邪仪式';btn.disabled=false; performAction(ghosts[currentGhost].action)},520)
    }
   
    function switchTab(n){
        document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'))
        document.getElementById('tab-'+n).classList.remove('hidden')
        document.querySelectorAll('.tab-btn').forEach((b,i)=>i===n?b.classList.add('tab-active'):b.classList.remove('tab-active'))
    }
   
    function toggleSound(){
        soundEnabled = !soundEnabled
        const icon = document.getElementById('sound-icon')
        icon.classList.toggle('fa-volume-up')
        icon.classList.toggle('fa-volume-xmark')
    }
   
    function restartAll(){
        purified = []
        document.getElementById('asset-gallery').innerHTML = ''
        document.getElementById('total-progress').style.width = '0%'
        document.getElementById('progress-text').textContent = '0%'
        document.getElementById('win-modal').classList.add('hidden')
        currentGhost = 0
        loadCurrentGhost()
        createGhostCards()
        switchTab(0)
    }
   
    function showAuthorInfo(){
        document.getElementById('author-modal').classList.remove('hidden')
    }
    function hideAuthorModal(){
        document.getElementById('author-modal').classList.add('hidden')
    }
   
    // 智能滚动导航栏（保持原逻辑）
    let lastScrollY = window.scrollY;
    const smartNav = document.getElementById('smart-nav');
    window.addEventListener('scroll', () => {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 80) {
            smartNav.classList.add('-translate-y-full');
        } else {
            smartNav.classList.remove('-translate-y-full');
        }
        lastScrollY = currentScrollY;
    });
   
    window.onload = () => {
        createGhostCards()
        loadCurrentGhost()
        switchTab(0)
        // 手机端默认显示仪式场
    }
</script>
</body>
</html>
